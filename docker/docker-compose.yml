version: '3.8'

services:
  # 1. PostgreSQL Shared Database (Tenant Data & n8n Data)
  postgres:
    image: postgres:15-alpine
    container_name: b2b_postgres_local
    restart: always
    environment:
      - POSTGRES_USER=b2b_user
      - POSTGRES_PASSWORD=b2b_password_secret
      - POSTGRES_DB=b2b_platform_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U b2b_user -d b2b_platform_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Flyway Database Migration Engine (Automated Migration on Startup)
  flyway:
    image: flyway/flyway:9-alpine
    container_name: b2b_flyway_migrator
    depends_on:
      postgres:
        condition: service_healthy
    command: -url=jdbc:postgresql://postgres:5432/b2b_platform_db -user=b2b_user -password=b2b_password_secret -connectRetries=60 migrate
    volumes:
      - ../db-migrations/sql:/flyway/sql

  # 3. n8n Workflow Automation Engine
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: b2b_n8n_local
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=b2b_platform_db
      - DB_POSTGRESDB_USER=b2b_user
      - DB_POSTGRESDB_PASSWORD=b2b_password_secret
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  n8n_data:
